# Digital Signature Service (formerly mock-qtsp)
#
# Standalone deployment, sibling to the lab backend but not coupled to it.
#
# Source repo:  github.com/fikua/fikua-digital-signature-service
# Image:        docker.io/fikua/fikua-digital-signature-service
# Public URL:   https://dss.fikua.com
#
# Routing: Traefik terminates :80 / :443 on the host and reverse-proxies
# to the container on the traefik-public network. The cert is issued by
# Let's Encrypt via DNS-01 against Cloudflare.
#
# Certificates are mounted from the host. The published image does NOT
# embed certs in the JAR (intentional: certs should never ship inside a
# public image). The cert + key live at:
#   /opt/vps/projects/fikua-lab/dss/certs/issuer-eseal.{crt,key}
# and are mounted read-only into the container.
#
# Source of truth for this file:
#   fikua-platform-iac/projects/fikua-lab/dss/compose.yaml
# Host path on the VPS:
#   /opt/vps/projects/fikua-lab/dss/

services:
  dss:
    image: fikua/fikua-digital-signature-service:${DSS_VERSION:-latest}
    container_name: fikua-digital-signature-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 9090
      CLIENT_ID: ${DSS_CLIENT_ID:-mock-client}
      CLIENT_SECRET: ${DSS_CLIENT_SECRET:-mock-secret}
      CREDENTIAL_ID: ${DSS_CREDENTIAL_ID:-mock-credential-001}
      CREDENTIAL_PASSWORD: ${DSS_CREDENTIAL_PASSWORD:-mock-password}
      TOKEN_TTL: ${DSS_TOKEN_TTL:-3600}
      SAD_TTL: ${DSS_SAD_TTL:-300}
      CERT_PATH: file:/certs/issuer-eseal.crt
      KEY_PATH: file:/certs/issuer-eseal.key
      # otel-collector lives in platform-services/compose.yaml, reachable
      # over traefik-public (see networks: below). It routes this
      # service's telemetry to the "fikua-dss" OpenObserve organization
      # by matching on OTEL_SERVICE_NAME — see platform-services/otel-collector/config.yaml.
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-otlp}
      # 4318 = OTLP/HTTP (the Java SDK's default protocol is http/protobuf,
      # not gRPC — pointing this at the gRPC port 4317 connects but resets
      # the connection on every export because the frames don't parse).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_SERVICE_NAME: fikua-digital-signature-service
      # Without this, the log auto-instrumentation only captures the log
      # message text — the StructuredArguments.kv("event", ...) fields
      # used by the business events in CscController/TokenService are
      # silently dropped, not forwarded as separate attributes.
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_LOGSTASH_STRUCTURED_ARGUMENTS: "true"
    volumes:
      - ./certs:/certs:ro
    networks:
      # Internal default network for healthcheck loopback, plus Traefik fabric.
      - default
      - traefik-public
    labels:
      traefik.enable: "true"
      traefik.http.routers.dss.rule: "Host(`dss.fikua.com`)"
      traefik.http.routers.dss.entrypoints: "web,websecure"
      traefik.http.routers.dss.tls: "true"
      traefik.http.routers.dss.tls.certresolver: "cloudflare"
      traefik.http.routers.dss.service: "dss"
      traefik.http.services.dss.loadbalancer.server.port: "9090"
      # Health-aware load balancing so a DOWN cert/key indicator removes the
      # container from rotation.
      traefik.http.services.dss.loadbalancer.healthcheck.path: "/health"
      traefik.http.services.dss.loadbalancer.healthcheck.port: "9090"
      traefik.http.services.dss.loadbalancer.healthcheck.interval: "30s"
      traefik.http.services.dss.loadbalancer.healthcheck.timeout: "5s"
    healthcheck:
      # /health is Spring Boot Actuator since 0.3.x: status code is 200 when
      # the cert + signing key components are UP, 503 otherwise. We also grep
      # the body so we fail fast if the shape ever drifts.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

networks:
  # Shared L7 fabric defined by platform-services. Containers join it to be
  # discoverable by Traefik via container labels.
  traefik-public:
    name: traefik-public
    external: true
