                $ref: '#/components/schemas/handle'
            example:
              handle: "878287f37b2bv293bv2bv237bv297bvbv"
    output-credentials-getChallenge:
      description: credentials/getChallenge response object
      content:
        application/json:
          schema:
            required:
              - challenge
            properties:
              challenge:
                $ref: '#/components/schemas/challenge'
            example:
              challenge: "What's your mother's birth name?"
    output-credentials-extendTransaction:
      description: credentials/extendTransaction response object
      content:
        application/json:
          schema:
            required:
              - SAD
            properties:
              SAD:
                $ref: '#/components/schemas/SAD'
              expiresIn:
                $ref: '#/components/schemas/expiresIn'
            example:
              SAD: "1/UsHDJ98349h9fgh9348hKKHDkHWVkl/8hsAW5usc8_5="
    output-signatures-signhash:
      description: signatures/signHash response object
      content:
        application/json:
          schema:
            properties:
                signatures:
                  $ref: '#/components/schemas/signatures'
                responseID:
                  $ref: '#/components/schemas/responseID'
            example:
              signatures:
                - KedJuTob5gtvYx9qM3k3gm7kbLBwVbEQRl26S2tmXjqNND7MRGtoew==
                - Idhef7xzgtvYx9qM3k3gm7kbLBwVbE98239S2tm8hUh85KKsfdowel==
    output-signatures-signdoc:
      description: signatures/signDoc response object
      content:
        application/json:
          schema:
            required:
              - signatures
            properties:
              DocumentWithSignature:
                $ref: '#/components/schemas/documentWithSignature'
              SignatureObject:
                $ref: '#/components/schemas/signatureObject'
              responseID:
                $ref: '#/components/schemas/responseID'
              validationInfo:
                  type: object
                  description: >-
                    The *responseID* generated by the server to uniquely identify the response to a previous asynchronous signature request (see [signatures/signHash] and [signatures/signDoc]).
                  properties:
                    ocsp:
                      type: array
                      description: >-
                        ocsp is an array of base64 encoded strings containing the DER-encoded ASN.1 datastructures of type OCSPResponse according to RFC 6960.
                      items:
                        type: string
                    crl:
                      type: array
                      description: >-
                        crl is an array of base64 encoded strings containing the DER-encoded ASN.1 datastructures 
                        of type CertificateList according to RFC 5280.
                      items:
                        type: string
                    certificates:
                      type: array
                      description: >-
                        contains one or more Base64-encoded X.509v3 certificates from the certificate chain used to create the respective signature and timestamps included in the signature.
                      items:
                        type: string
            example:
              SignatureObject:
              - MIAGCSqAMIACAQExDzANBglghkgBZQMEAgEFADCABgkqhkiG…Ss4rEsQV4AAAAAAAAA==
              - MIAGCSqGSIb3DQEHAqCAMIACAQExDzANBglghkgBZQMEqhki…W7pP1ZJFKuF2YAAAAAAA
    output-signatures-signPolling:
      description: signatures/signPolling response object
      content:
        application/json:
          schema:
            properties:
              signatures:
                $ref: '#/components/schemas/signatures'
              DocumentWithSignature:
                $ref: '#/components/schemas/documentWithSignature'
              SignatureObject:
                $ref: '#/components/schemas/signatureObject'
              validationInfo:
                  type: object
                  description: >-
                      The *validationInfo* as defined in the Output attribute table in [signatures/signDoc].
                      This value SHALL be returned when the requested signature(s) creation has been completed and [signatures/signDoc] was called with the *returnValidationInfo* value set to "true".                  
                  properties:
                    ocsp:
                      type: array
                      description: >-
                        ocsp is an array of base64 encoded strings containing the DER-encoded ASN.1 datastructures of type OCSPResponse according to RFC 6960.
                      items:
                        type: string
                    crl:
                      type: array
                      description: >-
                        crl is an array of base64 encoded strings containing the DER-encoded ASN.1 datastructures 
                        of type CertificateList according to RFC 5280.
                      items:
                        type: string
                    certificates:
                      type: array
                      description: >-
                        contains one or more Base64-encoded X.509v3 certificates from the certificate chain used to create the respective signature and timestamps included in the signature.
                      items:
                        type: string
            example:
              signatures:
              - KedJuTob5gtvYx9qM3k3gm7kbLBwVbEQRl26S2tmXjqNND7MRGtoew==
              - Idhef7xzgtvYx9qM3k3gm7kbLBwVbE98239S2tm8hUh85KKsfdowel==
    output-signatures-timestamp:
      description: signatures/timestamp response object
      content:
        application/json:
          schema:
            required:
              - timestamp
            properties:
              timestamp:
                $ref: '#/components/schemas/timestamp'
            example:
              timestamp: >-
                MGwCAQEGCSsGAQQB7U8CATAxMA0GCWCGSAFlAwQCAQUABCCrCqnrjH0VxXyQQlfnFJRx1jjrviTs7/GjKghr2AmluQIIVs5D8OUB4p4YDzIwMTQxMTE5MTEzMjM5WjADAgEBAgkAnWn2SSIWlXk=
    acceptedRequestResponse:                    
      description:  The previous asynchronous signature request has been accepted for processing, but the processinghas not yet been completed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    invalidRequestResponse:
      description: The request has failed due to invalid or missing required parameters. Error string is "invalid_request".
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    invalidAuthorizeResponse:
      description: The request has failed due to invalid authentication data, invalid or missing required parameters. Error string is either "invalid_request" or "invalid_authentication_data".
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    invalidSignaturesSignHashRequestResponse:
      description: The request has failed due to unsupported, invalid or missing required parameters. Error string is either "invalid_request" or "invalid_otp".
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    invalidSignaturesSignDocRequestResponse:
      description: The request has failed due to unsupported, invalid or missing required parameters. Error string is either "invalid_request" or "invalid_hash".
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    unauthorizedResponse:
      description: |
        The request has failed due to bad or expired authorization token being used. Error string is one of the following
        - "unauthorized_client"
        - "access_denied"
        - "expired_token"
        - "invalid_token"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    tooManyRequestsResponse:
      description: The request has failed due to rate limiting. Error string is "temporarily_unavailable".
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    internalServerErrorResponse:
      description: The request has failed due to an unexpected condition. Error string is "server_error".
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    notImplementedResponse:
      description: The request has failed due to an unimplemented method being requested. Error string is "not_implemented".
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    serviceUnavailableResponse:
      description: The request has failed due to temporary overloading or maintenance conditions. Error string is "temporarily_unavailable".
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
