name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (defaults to "latest")'
        required: false
        default: 'latest'
        type: string
  release:
    types: [published]

# Don't run two deploys at once against the same VPS.
concurrency:
  group: deploy-prd
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.image_tag || github.event.release.tag_name || 'latest' }} to prd
    runs-on: ubuntu-latest
    # The 'prd' environment is configured with required reviewers in
    # Settings → Environments → prd. Until somebody approves the run, the
    # job stays paused, so an autotrigger from a release publish does not
    # ship to production unsupervised.
    environment:
      name: prd
      url: https://mock-qtsp.altia.fikua.com/health

    steps:
      - name: Checkout (for the compose file)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH client (tunnel + key + known_hosts)
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # SSH key for the VPS user (ubuntu).
          printf '%s' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/vps_id
          chmod 600 ~/.ssh/vps_id

          # cloudflared access via service token (Cloudflare Access policies
          # must allow this service token on the hostname).
          cat <<EOF > ~/.cloudflared-env
          export TUNNEL_SERVICE_TOKEN_ID="$CF_ACCESS_CLIENT_ID"
          export TUNNEL_SERVICE_TOKEN_SECRET="$CF_ACCESS_CLIENT_SECRET"
          EOF
          chmod 600 ~/.cloudflared-env

          # SSH config that routes vps.fikua.com through the tunnel and
          # injects the Cloudflare Access service token headers.
          cat <<'EOF' > ~/.ssh/config
          Host vps.fikua.com
              User ubuntu
              IdentityFile ~/.ssh/vps_id
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new
              ProxyCommand sh -c '. ~/.cloudflared-env && cloudflared access ssh --hostname %h --service-token-id "$TUNNEL_SERVICE_TOKEN_ID" --service-token-secret "$TUNNEL_SERVICE_TOKEN_SECRET"'
              ServerAliveInterval 30
              ServerAliveCountMax 4
          EOF
          chmod 600 ~/.ssh/config

      - name: Copy compose.yaml from platform-iac source of truth
        # The compose file lives in the platform-iac repo, but to keep this
        # workflow self-contained we ship the same file alongside the app
        # under deploy/compose.yaml; if it isn't present yet we fall back to
        # whatever is already on the VPS.
        run: |
          if [ -f deploy/compose.yaml ]; then
            scp deploy/compose.yaml vps.fikua.com:/tmp/dss-compose.yaml
            ssh vps.fikua.com 'sudo cp /tmp/dss-compose.yaml /opt/vps/projects/fikua-lab/dss/compose.yaml && sudo chown ubuntu:ubuntu /opt/vps/projects/fikua-lab/dss/compose.yaml'
          else
            echo "::notice::deploy/compose.yaml not present in the app repo — keeping the on-host compose file as is."
          fi

      - name: Pull and restart on the VPS
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.event.release.tag_name || 'latest' }}
        run: |
          # The release tag is "v0.3.1" but the image tag is "0.3.1".
          NORMALISED_TAG="${IMAGE_TAG#v}"
          echo "Deploying fikua/fikua-digital-signature-service:$NORMALISED_TAG"
          ssh vps.fikua.com "
            set -e
            cd /opt/vps/projects/fikua-lab/dss
            DSS_VERSION='$NORMALISED_TAG' sudo --preserve-env=DSS_VERSION docker compose pull
            DSS_VERSION='$NORMALISED_TAG' sudo --preserve-env=DSS_VERSION docker compose up -d
          "

      - name: Wait for /health to report UP
        run: |
          for i in $(seq 1 30); do
            body=$(ssh vps.fikua.com 'curl -fsS http://127.0.0.1:9090/health' || true)
            echo "attempt $i: $body" | head -c 400
            echo
            if echo "$body" | grep -q '"status":"UP"'; then
              echo "✅ /health is UP"
              exit 0
            fi
            sleep 5
          done
          echo "❌ /health did not reach UP within 150s"
          exit 1

      - name: Smoke-test through Traefik (Host header)
        run: |
          ssh vps.fikua.com \
            'curl -sI -H "Host: mock-qtsp.altia.fikua.com" http://127.0.0.1:8081/health | head -5'
